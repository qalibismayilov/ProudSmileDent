<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Şifrəni unutdum | ProudSmileDent</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="site-header">
        <div class="container navbar">
            <a href="index.html" class="brand">
                <div class="brand-icon">P</div>
                <div class="brand-text">
                    <strong>ProudSmileDent</strong>
                    <span>Dental Clinic</span>
                </div>
            </a>

            <nav class="nav-menu">
                <a href="index.html">Ana səhifə</a>
                <a href="login.html">Daxil ol</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <div class="form-card" style="max-width:420px; margin:auto;">
                    <h2>Şifrəni unutdum</h2>

                    <p class="form-subtext">
                        E-poçtunuzu daxil edin. Sizə şifrə sıfırlama kodu göndəriləcək.
                    </p>

                    <form id="forgotForm">
                        <input type="email"
                               id="email"
                               placeholder="E-poçt"
                               required />

                        <button type="submit" class="btn btn-primary" id="forgotSubmitBtn">
                            Kod göndər
                        </button>
                    </form>

                    <div style="margin-top:16px;">
                        <a href="login.html" class="form-footer-link">
                            Geri qayıt
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toastBox" class="toast-box"></div>

    <script>
        const forgotForm = document.getElementById("forgotForm");
        const emailInput = document.getElementById("email");
        const forgotSubmitBtn = document.getElementById("forgotSubmitBtn");

        let isSubmitting = false;

        function showToast(message, type = "error") {
            const toastBox = document.getElementById("toastBox");
            if (!toastBox) return;

            toastBox.innerHTML = "";

            const toast = document.createElement("div");
            toast.className = `toast-message ${type}`;
            toast.textContent = message;

            toastBox.appendChild(toast);

            setTimeout(() => toast.classList.add("show"), 10);

            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        forgotForm.addEventListener("submit", async function (e) {
            e.preventDefault();

            if (isSubmitting) return;
            isSubmitting = true;

            const email = emailInput.value.trim();

            if (!email) {
                showToast("E-poçtu daxil edin.", "error");
                isSubmitting = false;
                return;
            }

            const originalText = forgotSubmitBtn.textContent;

            try {
                forgotSubmitBtn.disabled = true;
                forgotSubmitBtn.textContent = "Göndərilir...";

                const response = await fetch("/api/auth/forgot-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email })
                });

                const text = await response.text();
                console.log("FORGOT RESPONSE:", response.status, text);

                let data = {};
                try {
                    data = text ? JSON.parse(text) : {};
                } catch {
                    data = { message: text };
                }

                if (response.ok) {
                    showToast(data.message || "Kod göndərildi.", "success");
                    localStorage.setItem("resetEmail", email);

                    setTimeout(() => {
                        window.location.href = "reset-password.html";
                    }, 1500);
                } else {
                    const errorMessage =
                        (data.message || "Xəta baş verdi.") +
                        (data.detail ? " | " + data.detail : "");

                    showToast(errorMessage, "error");
                }
            } catch (error) {
                console.error("FORGOT ERROR:", error);
                showToast("Serverə qoşulmaq mümkün olmadı.", "error");
            } finally {
                forgotSubmitBtn.disabled = false;
                forgotSubmitBtn.textContent = originalText;
                isSubmitting = false;
            }
        });
    </script>
</body>
</html>
