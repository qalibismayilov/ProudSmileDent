<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Şifrəni sıfırla | ProudSmileDent</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header class="site-header">
        <div class="container navbar">
            <a href="index.html" class="brand">
                <div class="brand-icon">P</div>
                <div class="brand-text">
                    <strong>ProudSmileDent</strong>
                    <span>Dental Clinic</span>
                </div>
            </a>

            <nav class="nav-menu">
                <a href="index.html">Ana səhifə</a>
                <a href="login.html">Daxil ol</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">

                <div class="form-card" style="max-width:460px; margin:auto;">
                    <h2>Şifrəni sıfırla</h2>

                    <p class="form-subtext">
                        E-poçtunuza gələn kodu və yeni şifrənizi daxil edin.
                    </p>

                    <form id="resetForm">
                        <input type="email"
                               id="email"
                               placeholder="E-poçt"
                               required />

                        <input type="text"
                               id="code"
                               placeholder="Reset kodu"
                               required />

                        <input type="password"
                               id="newPassword"
                               placeholder="Yeni şifrə"
                               required />

                        <input type="password"
                               id="confirmPassword"
                               placeholder="Yeni şifrəni təkrar yazın"
                               required />

                        <button type="submit" class="btn btn-primary">
                            Şifrəni yenilə
                        </button>
                    </form>

                    <div style="margin-top:16px; display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;">
                        <a href="forgot-password.html" class="form-footer-link" style="margin:0;">
                            Kodu yenidən göndər
                        </a>

                        <a href="login.html" class="form-footer-link" style="margin:0;">
                            Girişə qayıt
                        </a>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <div id="toastBox" class="toast-box"></div>

    <script>
const resetForm = document.getElementById("resetForm");
const emailInput = document.getElementById("email");
const codeInput = document.getElementById("code");
const newPasswordInput = document.getElementById("newPassword");
const confirmPasswordInput = document.getElementById("confirmPassword");

function showToast(message, type = "error") {
    const toastBox = document.getElementById("toastBox");

    const toast = document.createElement("div");
    toast.className = `toast-message ${type}`;
    toast.textContent = message;

    toastBox.appendChild(toast);

    setTimeout(() => toast.classList.add("show"), 10);

    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
    }, 2500);
}

window.addEventListener("load", () => {
    const savedEmail = localStorage.getItem("resetEmail");
    if (savedEmail) {
        emailInput.value = savedEmail;
    }
});

resetForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    const email = emailInput.value.trim();
    const code = codeInput.value.trim();
    const newPassword = newPasswordInput.value.trim();
    const confirmPassword = confirmPasswordInput.value.trim();

    if (!email || !code || !newPassword || !confirmPassword) {
        showToast("Bütün xanaları doldurun.", "error");
        return;
    }

    if (newPassword !== confirmPassword) {
        showToast("Şifrələr uyğun deyil.", "error");
        return;
    }

    const submitButton = resetForm.querySelector('button[type="submit"]');
    const originalText = submitButton.textContent;

    try {
        submitButton.disabled = true;
        submitButton.textContent = "Yenilənir...";

        const response = await fetch("/api/auth/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                code,
                newPassword,
                confirmPassword
            })
        });

        const text = await response.text();

        let data = {};
        try {
            data = text ? JSON.parse(text) : {};
        } catch {
            data = { message: text };
        }

        if (response.ok) {
            showToast(data.message || "Şifrə uğurla yeniləndi.", "success");
            localStorage.removeItem("resetEmail");

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        } else {
            showToast(data.message || "Şifrə yenilənmədi.", "error");
        }
    } catch (error) {
        console.error(error);
        showToast("Serverə qoşulmaq mümkün olmadı.", "error");
    } finally {
        submitButton.disabled = false;
        submitButton.textContent = originalText;
    }
});
    </script>

</body>
</html>
